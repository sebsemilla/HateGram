services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hategram
      POSTGRES_PASSWORD: hategram123
      POSTGRES_DB: hategram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://hategram:hategram123@db:5432/hategram
      SECRET_KEY: supersecretkey_changeme_in_production
      YOUTUBE_API_KEY: "AIzaSyBVqOT7XEmNErBqBex-e2zGqpUGfQeXTIw"
      GEMINI_API_KEY: "AIzaSyAeFbZph659o6UnthPmvQC-ZHUrxTYFzX0"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
